# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: Gen

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: CheckoutRepo
      uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel twine pyecharts pathlib pandas
    # - name: GetS1GeneralData
    #   uses: GuillaumeFalourd/clone-github-repo-action@v1
    #   with:
    #     owner: 'TomoeMami'
    #     repository: 'S1PlainTextGeneral'
    # - name: GetS1BackupData
    #   uses: actions/checkout@v2
    #   with:
    #     repository: TomoeMami/S1PlainTextBackup
    #     path: S1PlainTextBackup
    - name: AutoEcharts
      run: |
        python gen.py
    - name: Pushe to Gitee repo
      uses: dmnemec/copy_file_to_another_repo_action@main
      env:
        API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
      with:
        source_file: 'index.html'
        destination_repo: 'TomoeMami/S1VtbStatic'
        # destination_folder: ''
        github_server: 'github.com'
        user_email: 'trembleafterme@outlook.com'
        user_name: 'TomoeMami'
        commit_message: 'Push result to Gitee repo'
    - name: commit
      env:
        TZ: 'CST-8'
      run: |
        sudo timedatectl set-timezone Asia/Shanghai
        git config --global user.email trembleafterme@outlook.com
        git config --global user.name TomoeMami
        datime=$(date "+%Y年%m月%d日 %H:%M")
        echo "git commit: 上传于 $datime"
        if [ -n "$(git status -s)" ];then
            git add .
            git commit -m "上传于 $datime" -a
        fi
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
